apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  type: ClusterIP
  ports:
    - port: 8501
      targetPort: 8501
  selector:
    app: dashboard-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
spec:
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: beni2/writers_net-dashboard-service:latest
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: app-config
